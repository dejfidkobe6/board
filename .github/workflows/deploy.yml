name: Deploy to board.besix.cz

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Generate api/config.php from Secrets
        run: |
          mkdir -p api
          {
            echo "<?php"
            echo "define('DB_HOST', '${{ secrets.DB_HOST }}');"
            echo "define('DB_NAME', '${{ secrets.DB_NAME }}');"
            echo "define('DB_USER', '${{ secrets.DB_USER }}');"
            echo "define('DB_PASS', '${{ secrets.DB_PASS }}');"
            echo "define('SESSION_SECRET', '${{ secrets.SESSION_SECRET }}');"
            echo "define('MAIL_FROM', '${{ secrets.MAIL_FROM }}');"
            echo "define('APP_URL', '${{ secrets.APP_URL }}');"
            echo ""
            echo "ini_set('session.cookie_httponly', 1);"
            echo "ini_set('session.cookie_samesite', 'Lax');"
            echo "ini_set('session.cookie_secure', 1);"
            echo "session_name('BESIX_SESS');"
            echo "if (session_status() === PHP_SESSION_NONE) session_start();"
            echo ""
            echo "header('Access-Control-Allow-Origin: ' . APP_URL);"
            echo "header('Access-Control-Allow-Credentials: true');"
            echo "header('Access-Control-Allow-Methods: GET, POST, PUT, DELETE, OPTIONS');"
            echo "header('Access-Control-Allow-Headers: Content-Type, X-Requested-With');"
            echo "header('Content-Type: application/json; charset=UTF-8');"
            echo "if (\$_SERVER['REQUEST_METHOD'] === 'OPTIONS') { http_response_code(204); exit; }"
            echo ""
            echo "function getDB(): PDO {"
            echo "    static \$pdo = null;"
            echo "    if (\$pdo !== null) return \$pdo;"
            echo "    \$pdo = new PDO("
            echo "        'mysql:host=' . DB_HOST . ';dbname=' . DB_NAME . ';charset=utf8mb4',"
            echo "        DB_USER, DB_PASS,"
            echo "        [PDO::ATTR_ERRMODE => PDO::ERRMODE_EXCEPTION,"
            echo "         PDO::ATTR_DEFAULT_FETCH_MODE => PDO::FETCH_ASSOC,"
            echo "         PDO::ATTR_EMULATE_PREPARES => false]"
            echo "    );"
            echo "    return \$pdo;"
            echo "}"
            echo "?>"
          } > api/config.php

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: green.thinline.cz
          username: board_besix_cz
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
